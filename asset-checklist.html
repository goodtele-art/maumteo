const STORAGE_KEY = "maumteo_asset_checks";

function loadChecks() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch { return {}; }
}
function saveChecks(checks) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(checks));
}

let checks = loadChecks();
let activeFilter = "all";

function updateProgress() {
  const total = DATA.reduce((s, c) => s + c.count, 0);
  const done = Object.values(checks).filter(Boolean).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById("progFill").style.width = pct + "%";
  document.getElementById("progText").textContent = `${done} / ${total} 완료 (${pct}%)`;
}

function render() {
  const container = document.getElementById("categories");
  container.innerHTML = "";

  for (const cat of DATA) {
    if (activeFilter !== "all" && cat.tag !== activeFilter) continue;

    const div = document.createElement("div");
    div.className = "category";
    div.dataset.id = cat.id;

    const isAudio = cat.tag === "audio";
    const countClass = isAudio ? "cat-count audio" : "cat-count";

    div.innerHTML = `
      <div class="category-header">
        <div>
          <span class="cat-title">${cat.id}. ${cat.title}</span>
          <span class="cat-path">public/assets/${cat.path}</span>
        </div>
        <div class="cat-meta">
          <span class="cat-size">${cat.size}</span>
          <span class="${countClass}">${cat.count}</span>
          <span class="arrow">▶</span>
        </div>
      </div>
      <div class="items">
        <table>
          <thead><tr><th class="fcheck"></th><th>파일명</th><th>설명 / 프롬프트</th></tr></thead>
          <tbody>${cat.items.map(item => {
            if (item.group) {
              return `<tr class="sub-group"><td></td><td colspan="2">${item.group}</td></tr>`;
            }
            const key = cat.path + item.file;
            const checked = checks[key] ? "checked" : "";
            const prompt = PROMPTS[item.file] || "";
            const promptHtml = prompt
              ? `<tr class="prompt-row"><td></td><td colspan="2"><div class="prompt-box"><div class="prompt-text">${prompt.replace(/</g,'&lt;')}</div><button class="copy-btn" data-prompt="${prompt.replace(/"/g,'&quot;').replace(/</g,'&lt;')}">복사</button></div></td></tr>`
              : "";
            return `<tr>
              <td class="fcheck"><input type="checkbox" data-key="${key}" ${checked}></td>
              <td class="fname">${item.file}</td>
              <td class="fdesc">${item.desc}</td>
            </tr>${promptHtml}`;
          }).join("")}</tbody>
        </table>
      </div>
    `;

    div.querySelector(".category-header").addEventListener("click", () => {
      div.classList.toggle("open");
    });

    container.appendChild(div);
  }

  container.addEventListener("change", (e) => {
    if (e.target.type === "checkbox") {
      const key = e.target.dataset.key;
      checks[key] = e.target.checked;
      saveChecks(checks);
      updateProgress();
    }
  });

  container.addEventListener("click", (e) => {
    if (e.target.classList.contains("copy-btn")) {
      const text = e.target.dataset.prompt;
      navigator.clipboard.writeText(text).then(() => {
        e.target.textContent = "복사됨!";
        e.target.classList.add("copied");
        setTimeout(() => { e.target.textContent = "복사"; e.target.classList.remove("copied"); }, 1500);
      });
    }
  });

  updateProgress();
}

// Filter buttons
document.querySelector(".filter-bar").addEventListener("click", (e) => {
  if (!e.target.classList.contains("filter-btn")) return;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  e.target.classList.add("active");
  activeFilter = e.target.dataset.filter;
  render();
});

render();
</script>
</body>
</html>
