<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마음터 에셋 트래커</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--hover:#334155;--tx:#f1f5f9;--tx2:#94a3b8;--tx3:#64748b;
--ok:#4ade80;--miss:#fb7185;--teal:#2dd4bf;--amber:#fbbf24;--sky:#38bdf8;--violet:#a78bfa;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--tx);padding:16px;line-height:1.5}
h1{text-align:center;font-size:1.5rem;margin-bottom:4px}
.sub{text-align:center;color:var(--tx2);font-size:.85rem;margin-bottom:16px}

/* Summary */
.sum{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.sc{background:var(--card);border-radius:10px;padding:10px 18px;text-align:center;min-width:80px}
.sc .n{font-size:1.6rem;font-weight:800}
.sc .l{font-size:.7rem;color:var(--tx2)}
.sc-ok .n{color:var(--ok)} .sc-miss .n{color:var(--miss)} .sc-total .n{color:var(--teal)} .sc-pct .n{color:var(--amber)}

/* Progress */
.prog-wrap{position:sticky;top:0;z-index:20;background:var(--bg);padding:6px 0 10px}
.prog-bar{height:8px;background:var(--card);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .4s}
.prog-text{text-align:center;font-size:.75rem;color:var(--tx3);margin-top:3px}

/* Filter */
.fbar{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
.fb{background:var(--card);border:1px solid transparent;color:var(--tx2);padding:5px 12px;border-radius:7px;cursor:pointer;font-size:.78rem;transition:all .2s}
.fb:hover{background:var(--hover);color:var(--tx)}
.fb.on{background:var(--teal);color:#0f172a;font-weight:600}
.status-filter{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.sf{font-size:.75rem;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--hover);color:var(--tx2);background:transparent}
.sf:hover{border-color:var(--tx3)}
.sf.on{border-color:var(--teal);color:var(--teal)}

/* Category */
.cat{margin-bottom:16px;border-radius:10px;overflow:hidden;background:var(--card)}
.ch{padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.ch:hover{background:var(--hover)}
.ct{font-weight:700;font-size:.9rem}
.cm{display:flex;gap:8px;align-items:center}
.cc{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:8px}
.cc-ok{background:var(--ok);color:#0f172a}
.cc-miss{background:var(--miss);color:#0f172a}
.cp{font-size:.65rem;color:var(--tx3);font-family:monospace}
.arr{transition:transform .2s;font-size:.75rem;color:var(--tx3)}
.cat.open .arr{transform:rotate(90deg)}

/* Items */
.items{display:none;padding:0 16px 12px}
.cat.open .items{display:block}
.item{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #1e293b}
.item:last-child{border-bottom:none}
.item-preview{width:64px;height:64px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--hover);display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer}
.item-preview.big{width:120px;height:68px}
.item-preview img{width:100%;height:100%;object-fit:cover}
.item-preview .ph{font-size:1.5rem}
.item-preview.audio-preview{background:linear-gradient(135deg,#1e1b4b,#312e81)}
.item-info{flex:1;min-width:0}
.item-file{font-family:monospace;font-size:.75rem;color:var(--sky)}
.item-desc{font-size:.75rem;color:var(--tx2);margin-top:1px}
.item-status{display:inline-block;font-size:.6rem;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:6px}
.st-ok{background:var(--ok);color:#0f172a}
.st-miss{background:var(--miss);color:#0f172a}
.grp{color:var(--violet);font-weight:600;font-size:.8rem;padding:10px 0 4px}
.grp:first-child{padding-top:4px}
.prompt-box{margin-top:4px;background:#0f172a;border-radius:5px;padding:4px 8px;display:flex;gap:6px;align-items:flex-start}
.prompt-text{flex:1;font-size:.65rem;color:var(--tx3);font-family:monospace;word-break:break-all;line-height:1.3;max-height:40px;overflow:auto}
.copy-btn{flex-shrink:0;background:var(--hover);border:none;color:var(--tx2);font-size:.6rem;padding:2px 7px;border-radius:3px;cursor:pointer}
.copy-btn:hover{background:var(--teal);color:#0f172a}
.copy-btn.copied{background:var(--ok);color:#0f172a}

/* Audio player */
.audio-ctrl{margin-top:4px}
.audio-ctrl audio{height:28px;width:100%;max-width:240px}

/* Lightbox */
.lb{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.85);align-items:center;justify-content:center;cursor:zoom-out}
.lb.show{display:flex}
.lb img{max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5)}

@media(max-width:640px){body{padding:10px}.cp{display:none}.item-preview{width:48px;height:48px}}
</style>
</head>

// ── Asset existence checking ──
const assetStatus = {}; // path -> true/false
let totalAssets = 0;
let checkedAssets = 0;
let foundAssets = 0;

function getAllFiles() {
  const files = [];
  for (const cat of DATA) {
    for (const item of cat.items) {
      if (item.f) { files.push({ path: cat.path + item.f, isAudio: cat.tag === 'audio' }); totalAssets++; }
    }
  }
  return files;
}

function checkAsset(file) {
  return new Promise(resolve => {
    const url = A + file.path;
    if (file.isAudio) {
      fetch(url, { method: 'HEAD' }).then(r => resolve(r.ok)).catch(() => resolve(false));
    } else {
      const img = new Image();
      img.onload = () => resolve(true);
      img.onerror = () => resolve(false);
      img.src = url;
    }
  });
}

async function checkAll() {
  const files = getAllFiles();
  const batch = 10;
  for (let i = 0; i < files.length; i += batch) {
    const chunk = files.slice(i, i + batch);
    const results = await Promise.all(chunk.map(f => checkAsset(f)));
    chunk.forEach((f, j) => {
      assetStatus[f.path] = results[j];
      if (results[j]) foundAssets++;
      checkedAssets++;
    });
    updateUI();
  }
}

// ── Filters ──
let tagFilter = 'all';
let statusFilter = 'all';

// ── Render ──
function updateUI() {
  const pct = totalAssets ? Math.round((foundAssets / totalAssets) * 100) : 0;
  const miss = totalAssets - foundAssets;
  const gradColor = pct > 70 ? 'var(--ok)' : pct > 40 ? 'var(--amber)' : 'var(--miss)';

  document.getElementById('summary').innerHTML = `
    <div class="sc sc-ok"><div class="n">${foundAssets}</div><div class="l">완료</div></div>
    <div class="sc sc-miss"><div class="n">${miss}</div><div class="l">미완료</div></div>
    <div class="sc sc-total"><div class="n">${totalAssets}</div><div class="l">전체</div></div>
    <div class="sc sc-pct"><div class="n">${pct}%</div><div class="l">진행률</div></div>`;

  const fill = document.getElementById('progFill');
  fill.style.width = pct + '%';
  fill.style.background = `linear-gradient(90deg, ${gradColor}, ${gradColor}88)`;
  document.getElementById('progText').textContent =
    checkedAssets < totalAssets ? `검사 중... ${checkedAssets}/${totalAssets}` : `${foundAssets} / ${totalAssets} 완료 (${pct}%)`;

  renderCats();
}

function renderCats() {
  const el = document.getElementById('cats');
  el.innerHTML = '';

  for (const cat of DATA) {
    if (tagFilter !== 'all' && cat.tag !== tagFilter) continue;

    const fileItems = cat.items.filter(i => i.f);
    const okCount = fileItems.filter(i => assetStatus[cat.path + i.f]).length;
    const missCount = fileItems.length - okCount;

    if (statusFilter === 'ok' && okCount === 0) continue;
    if (statusFilter === 'miss' && missCount === 0) continue;

    const div = document.createElement('div');
    div.className = 'cat';

    div.innerHTML = `
      <div class="ch">
        <div><span class="ct">${cat.title}</span> <span class="cp">${cat.path}</span></div>
        <div class="cm">
          <span class="cc cc-ok">${okCount}</span>
          ${missCount > 0 ? `<span class="cc cc-miss">${missCount}</span>` : ''}
          <span class="arr">▶</span>
        </div>
      </div>
      <div class="items">${renderItems(cat)}</div>`;

    div.querySelector('.ch').onclick = () => div.classList.toggle('open');
    el.appendChild(div);
  }

  // Copy buttons
  el.querySelectorAll('.copy-btn').forEach(btn => {
    btn.onclick = () => {
      navigator.clipboard.writeText(btn.dataset.p).then(() => {
        btn.textContent = '복사됨!'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1200);
      });
    };
  });

  // Image previews - lightbox
  el.querySelectorAll('.item-preview[data-src]').forEach(p => {
    p.onclick = () => {
      const lb = document.getElementById('lightbox');
      document.getElementById('lbImg').src = p.dataset.src;
      lb.classList.add('show');
    };
  });
}

function renderItems(cat) {
  let html = '';
  for (const item of cat.items) {
    if (item.g) {
      html += `<div class="grp">${item.g}</div>`;
      continue;
    }

    const key = cat.path + item.f;
    const ok = assetStatus[key];
    const pending = assetStatus[key] === undefined;

    if (statusFilter === 'ok' && !ok) continue;
    if (statusFilter === 'miss' && ok) continue;

    const isAudio = cat.tag === 'audio';
    const url = A + key;
    const stClass = pending ? '' : ok ? 'st-ok' : 'st-miss';
    const stText = pending ? '...' : ok ? '완료' : '미완료';
    const previewClass = cat.sz === 'big' ? 'item-preview big' : 'item-preview';

    let previewHtml;
    if (isAudio) {
      previewHtml = `<div class="${previewClass} audio-preview"><span class="ph">🎵</span></div>`;
    } else if (ok) {
      previewHtml = `<div class="${previewClass}" data-src="${url}"><img src="${url}" loading="lazy" alt="${item.f}"></div>`;
    } else {
      previewHtml = `<div class="${previewClass}"><span class="ph">🖼️</span></div>`;
    }

    const prompt = PROMPTS[item.f] || '';
    const promptHtml = prompt ? `<div class="prompt-box"><div class="prompt-text">${prompt.replace(/</g,'&lt;')}</div><button class="copy-btn" data-p="${prompt.replace(/"/g,'&quot;')}">복사</button></div>` : '';

    const audioHtml = isAudio && ok ? `<div class="audio-ctrl"><audio controls preload="none" src="${url}"></audio></div>` : '';

    html += `<div class="item">
      ${previewHtml}
      <div class="item-info">
        <div><span class="item-file">${item.f}</span><span class="item-status ${stClass}">${stText}</span></div>
        <div class="item-desc">${item.d}</div>
        ${audioHtml}${promptHtml}
      </div>
    </div>`;
  }
  return html;
}

// ── Events ──
document.getElementById('filterBar').onclick = e => {
  if (!e.target.classList.contains('fb')) return;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('on'));
  e.target.classList.add('on');
  tagFilter = e.target.dataset.f;
  renderCats();
};

document.querySelector('.status-filter').onclick = e => {
  if (!e.target.classList.contains('sf')) return;
  document.querySelectorAll('.sf').forEach(b => b.classList.remove('on'));
  e.target.classList.add('on');
  statusFilter = e.target.dataset.s;
  renderCats();
};

// ── Init ──
checkAll();
</script>
</body>
